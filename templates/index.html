<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>F1 Chatbot</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    id="body"
    class="bg-white h-screen flex items-center justify-center transition-all"
  >
    <div
      class="w-full max-w-md bg-gray-100 rounded-2xl shadow-xl flex flex-col overflow-hidden"
    >
      <!-- Header -->
      <div
        class="bg-red-600 text-white flex justify-between items-center p-4 font-bold"
      >
        <span>F1 Chatbot</span>
        <button onclick="toggleTheme()">🌙</button>
      </div>

      <!-- Logo -->
      <div class="flex justify-center p-2">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/3/33/F1.svg"
          class="h-6"
        />
      </div>

      <!-- Messages -->
      <div
        id="messages"
        class="flex flex-col gap-2 p-4 h-80 overflow-y-auto"
      ></div>

      <!-- Quick buttons -->
      <div class="flex flex-wrap gap-2 px-4 pb-2 justify-center">
        <button onclick="quick(1)" class="bg-gray-300 px-3 py-1 rounded">
          1
        </button>
        <button onclick="quick(2)" class="bg-gray-300 px-3 py-1 rounded">
          2
        </button>
        <button onclick="quick(3)" class="bg-gray-300 px-3 py-1 rounded">
          3
        </button>
        <button onclick="quick(4)" class="bg-gray-300 px-3 py-1 rounded">
          4
        </button>
        <button onclick="quick(5)" class="bg-gray-300 px-3 py-1 rounded">
          5
        </button>
      </div>

      <!-- Input -->
      <div class="flex border-t">
        <input
          id="input"
          class="flex-1 p-3 outline-none"
          placeholder="Digite sua mensagem..."
        />
        <button onclick="sendMessage()" class="bg-red-600 text-white px-4">
          Enviar
        </button>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
